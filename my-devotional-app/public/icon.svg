<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#152d4a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Logo group — symbol left, text right, vertically centered -->
  <g transform="translate(256, 220)">
    <!-- Symbol: circle + 3 rays, centered at (-110, 0) -->
    <g transform="translate(-120, 0)">
      <!-- Outer circle -->
      <circle cx="0" cy="0" r="72" fill="none" stroke="white" stroke-width="7"/>
      <!-- Inner circle -->
      <circle cx="0" cy="0" r="14" fill="none" stroke="white" stroke-width="5.5"/>
      <!-- Top ray -->
      <line x1="0" y1="-14" x2="0" y2="-72" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
      <!-- Bottom-left ray -->
      <line x1="-9" y1="11" x2="-50" y2="53" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
      <!-- Bottom-right ray -->
      <line x1="9" y1="11" x2="50" y2="53" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    </g>

    <!-- Text: BISERICA on top, IMPACT below -->
    <g transform="translate(50, 0)">
      <text x="0" y="-16" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="800" letter-spacing="7">BISERICA</text>
      <text x="0" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" fill="white" text-anchor="middle" font-weight="900" letter-spacing="9">IMPACT</text>
    </g>
  </g>

  <!-- Subtitle -->
  <text x="256" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#d4a843" text-anchor="middle" font-weight="600" letter-spacing="3">TIMIȘOARA</text>
</svg>
